<!DOCTYPE html>

<html lang="en" class="no-js">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <title>{{site.title}}</title>
  <meta name="description" content="{{site.description}}">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="https://use.typekit.net/{{site.typekitId}}.js"></script>
  <script>try { Typekit.load({ async: true }); } catch (e) { }</script>

  <link rel="stylesheet" href="/styles/original.css">
  <link rel="stylesheet" href="/styles/buttons.css">
  <link rel="stylesheet" href="/styles/intro.css">
  <link rel="stylesheet" href="/styles/works-grid.css">

  <script type="module" src="/js/main.js"></script>

  <script>
    (function (i, s, o, g, r, a, m) {
      i['GoogleAnalyticsObject'] = r; i[r] = i[r] || function () {
        (i[r].q = i[r].q || []).push(arguments)
      }, i[r].l = 1 * new Date(); a = s.createElement(o),
        m = s.getElementsByTagName(o)[0]; a.async = 1; a.src = g; m.parentNode.insertBefore(a, m)
    })(window, document, 'script', 'https://www.google-analytics.com/analytics.js', 'ga');

    ga('create', '{{site.googleAnalyticsId}}', 'auto');
    ga('send', 'pageview');

  </script>
</head>

<body>


  <main id="content" class="page-content">
    <div class="section section__top"></div>
    <header class="section section--intro" id="intro">
      <div class="row row@md">
        <div class="gr-12 gr-8@md">
          <div class="section--intro__titles">
            <h1>{{site.name}}</h1>
            <h2>{{site.tagline}}</h2>
          </div>
          <p class="standfirst">
            {{site.standfirst}}
          </p>
        </div>
        <div class="gr-12 gr-4@md intro-photo-container">
          <img src="/images/photo.png" alt="Daniel Fickling" class="intro-photo">
        </div>
      </div>
    </header>
    <section class="section section--about" id="about">
      <h3>About</h3>
      <div class="row row@md">
        <div class="gr-12 gr-6@md">
          <p>{{site.about.paragraph1}}</p>
          <p>{{site.about.paragraph2}}</p>
          <p>{{site.about.paragraph3}}</p>
          <p>{{site.about.paragraph4}}</p>
          <div class="about__links">
            <a href="https://www.linkedin.com/in/daniel-fickling" target="_blank" class="btn btn--white about__btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
              </svg>
              <span>LinkedIn</span>
            </a>
            <a href="{{site.resumeUrl}}" target="_blank" class="btn btn--white about__btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
              </svg>
              <span>View Resume</span>
            </a>
          </div>
        </div>
      </div>
    </section>
    <section id="work">
      <div class="section section--work">
        <h3>Works</h3>
        <div class="works-grid">
          {{#each featuredWorks}}
          <a href="{{this.page}}" class="work-tile">
            <img src="/images/{{this.image}}" alt="{{this.alt}}" class="work-tile__image">
            <div class="work-tile__overlay">
              <h4 class="work-tile__title">{{this.title}}</h4>
              <p class="work-tile__subtitle">{{this.subtitle}}</p>
            </div>
          </a>
          {{/each}}
        </div>
      </div>
    </section>


  </main>
</body>

</html>
