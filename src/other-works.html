<!DOCTYPE html>

<html lang="en" class="no-js">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Other Works - {{site.title}}</title>
    <meta name="description" content="Other works and projects by {{site.name}}">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <script src="https://use.typekit.net/{{site.typekitId}}.js"></script>
    <script>try { Typekit.load({ async: true }); } catch (e) { }</script>

    <script>
        (function (i, s, o, g, r, a, m) {
            i['GoogleAnalyticsObject'] = r; i[r] = i[r] || function () {
                (i[r].q = i[r].q || []).push(arguments)
            }, i[r].l = 1 * new Date(); a = s.createElement(o),
                m = s.getElementsByTagName(o)[0]; a.async = 1; a.src = g; m.parentNode.insertBefore(a, m)
        })(window, document, 'script', 'https://www.google-analytics.com/analytics.js', 'ga');

        ga('create', '{{site.googleAnalyticsId}}', 'auto');
        ga('send', 'pageview');

    </script>
</head>

<body>

    <div class="page-nav-toggle">
        <span class="page-nav-toggle__top"></span>
        <span class="page-nav-toggle__middle"></span>
        <span class="page-nav-toggle__bottom"></span>
    </div>
    <div class="page-nav" id="page-nav">
        <nav>
            <ul>
                {{#each site.nav}}
                <li><a href="{{this.href}}" {{#if this.id}}id="{{this.id}}" {{/if}} {{#if this.external}}target="_blank"
                        {{/if}} class="page-nav__link">{{this.label}}</a></li>
                {{/each}}
            </ul>
        </nav>
    </div>
    <main id="content" class="page-content">
        <div class="section section__top"></div>
        <header class="section section--intro" id="intro">
            <a href="/" class="work-detail__back">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                </svg>
                Back to Home
            </a>
            <h1>Other Works</h1>
            <p class="standfirst">
                A collection of earlier projects from my design and development career.
            </p>
        </header>

        <div class="projects">
            {{#each otherWorks}}
            <div class="project project--{{this.id}}">
                <div class="project__inner section">
                    <h5>{{this.title}}</h5>
                    <div class="row row@md">
                        <div class="gr-12 gr-6@md">
                            <p>{{this.description}}</p>
                            {{#if this.url}}
                            <p><a target="_blank" href="{{this.url}}">{{this.urlDisplay}}</a></p>
                            {{/if}}
                        </div>
                    </div>
                    <img class="project__img" data-action="zoom" src="/images/{{this.image}}" alt="{{this.alt}}">
                </div>
            </div>
            {{/each}}
        </div>

        <script type="module" src="/js/main.js"></script>

    </main>
</body>

</html>
